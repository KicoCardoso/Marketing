name: Sincronizar Clint -> Meta Conversions API

on:
  # Agendamento automático PAUSADO em 21/07/2026 a pedido do Kico: o funil completo
  # (agendamentos/comparecimentos/vendas) volta a ser atualizado manualmente a partir
  # dos envios do AspektoApp, pra não sobrescrever o comentário manual no ClickUp a
  # cada 30 min. Pra reativar, é só descomentar o bloco "schedule" abaixo.
  # schedule:
  #   - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sincronizar eventos de conversão (Clint -> Meta)
        env:
          CLINT_API_TOKEN: ${{ secrets.CLINT_API_TOKEN }}
          META_CAPI_ACCESS_TOKEN: ${{ secrets.META_CAPI_ACCESS_TOKEN }}
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: node scripts/sync_clint_to_meta.mjs

      - name: Publicar estado atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/clint_sync_state.json docs/clint_metrics.json
          git diff --cached --quiet || git commit -m "chore: sincronizar eventos Clint -> Meta"
          git pull --rebase --autostash
          git push
