name: Atualizar dashboard de marketing

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Buscar dados do ClickUp
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: node scripts/fetch_clickup.mjs

      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: atualizar dados do dashboard"
          git push
