<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grupo Aspekto — Marketing</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #05070a; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .tv { background: #05070a; padding: 20px 24px 32px; min-height: 100vh; display: flex; flex-direction: column; gap: 22px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; border-bottom: 0.5px solid #1e2d3d; flex-wrap: wrap; gap: 10px; }
  .brand-name { font-size: 17px; font-weight: 500; color: #e6edf3; letter-spacing: -0.4px; }
  .brand-sub { font-size: 12px; color: #8b9aaa; margin-top: 3px; }
  .live { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; color: #4fc3f7; background: #0d2233; padding: 5px 12px; border-radius: 20px; border: 0.5px solid #1a3a52; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4fc3f7; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .warn-banner { font-size: 11px; color: #f5c542; background: #171300; border: 0.5px solid #3d2e00; padding: 6px 10px; border-radius: 6px; display: none; }

  .dashboard-section { background: #0d1117; border: 0.5px solid #1e2d3d; border-radius: 12px; padding: 16px 18px 18px; }
  .section-header { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 0.5px solid #1e2d3d; }
  .section-accent { width: 4px; height: 16px; border-radius: 2px; flex-shrink: 0; }
  .section-title { font-size: 13px; font-weight: 500; letter-spacing: 0.2px; color: #e6edf3; }
  .section-subtitle { font-size: 9.5px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: #6e8394; margin: 14px 0 8px; }

  .grid { display: grid; grid-template-columns: repeat(10, minmax(148px, 1fr)); gap: 8px; align-items: start; overflow-x: auto; padding-bottom: 6px; }
  .col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .col-header { padding: 6px 6px 8px; border-bottom: 0.5px solid #1e2d3d; margin-bottom: 2px; }
  .col-title { font-size: 8.5px; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; color: #6e8394; line-height: 1.3; }
  .col-time { font-size: 9px; font-weight: 500; color: #4fc3f7; margin-top: 3px; white-space: nowrap; }
  .col-count { font-size: 12px; font-weight: 500; color: #e6edf3; margin-top: 3px; }
  .col-count span { font-size: 9px; font-weight: 400; color: #5a6a7a; margin-left: 3px; }
  .accent-bar { width: 20px; height: 2px; border-radius: 2px; margin-bottom: 6px; }
  .cards { display: flex; flex-direction: column; gap: 4px; min-height: 20px; }
  .empty-col { font-size: 9.5px; color: #3d4a58; padding: 10px 4px; text-align: center; }
  .client-card { border-radius: 6px; padding: 7px 8px; border: 0.5px solid transparent; display: flex; flex-direction: column; gap: 4px; text-decoration: none; }
  .card-ok     { background: #0f1a10; border-color: #1a3d20; }
  .card-warn   { background: #171300; border-color: #3d2e00; }
  .card-danger { background: #170d0d; border-color: #3d1010; }
  .card-neutral{ background: #12161c; border-color: #1e2d3d; }
  .c-nome { font-size: 11px; font-weight: 500; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .c-dono { font-size: 9.5px; color: #5a6a7a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
  .c-avatar { width: 14px; height: 14px; border-radius: 50%; background: #1e2d3d; color: #8b9aaa; font-size: 6.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .c-bottom { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .c-tempo { font-size: 9.5px; font-weight: 500; white-space: nowrap; }
  .c-ok     { color: #4ade80; }
  .c-warn   { color: #f5c542; }
  .c-danger { color: #f56b6b; }
  .c-neutral{ color: #5a6a7a; }
  .blink { animation: pisca 1.2s infinite; }
  @keyframes pisca { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .badge { font-size: 8px; font-weight: 500; padding: 1px 5px; border-radius: 8px; white-space: nowrap; }
  .badge-ok     { background: #0d2a12; color: #4ade80; border: 0.5px solid #1a5c28; }
  .badge-warn   { background: #2a1f00; color: #f5c542; border: 0.5px solid #5a4000; }
  .badge-danger { background: #2a0d0d; color: #f56b6b; border: 0.5px solid #5a1010; }
  .badge-neutral{ background: #171b21; color: #5a6a7a; border: 0.5px solid #262f3a; }
  .stage-tag { font-size: 8px; font-weight: 500; color: #8b9aaa; background: #171b21; border: 0.5px solid #262f3a; border-radius: 8px; padding: 1px 6px; white-space: nowrap; }
  .loading-msg { color: #6e8394; font-size: 12px; padding: 20px; text-align: center; }

  .by-user-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .user-col { display: flex; flex-direction: column; gap: 6px; background: #12161c; border: 0.5px solid #1e2d3d; border-radius: 8px; padding: 8px; }
  .user-col-header { display: flex; align-items: center; gap: 7px; padding-bottom: 7px; border-bottom: 0.5px solid #1e2d3d; }
  .user-col-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .user-col-name { font-size: 11px; font-weight: 500; color: #e6edf3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-col-stats { font-size: 9px; color: #5a6a7a; white-space: nowrap; }

  .type-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
  .type-card { background: #12161c; border: 0.5px solid #1e2d3d; border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
  .type-name { font-size: 11px; font-weight: 500; color: #e6edf3; }
  .type-count { font-size: 18px; font-weight: 500; color: #e6edf3; }
  .type-count span { font-size: 9px; font-weight: 400; color: #5a6a7a; margin-left: 4px; }
  .type-time { font-size: 9.5px; color: #8b9aaa; }

  .ontime-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .ontime-chip { display: flex; align-items: center; gap: 6px; background: #12161c; border: 0.5px solid #1e2d3d; border-radius: 14px; padding: 4px 10px; }
  .ot-name { font-size: 9px; color: #8b9aaa; white-space: nowrap; }
  .ot-value { font-size: 10px; font-weight: 500; white-space: nowrap; }
  .ot-good { color: #4ade80; }
  .ot-warn { color: #f5c542; }
  .ot-bad { color: #f56b6b; }
  .ot-neutral { color: #5a6a7a; }

  .growth-row { display: flex; flex-direction: column; gap: 6px; }
  .growth-item { display: flex; align-items: center; gap: 8px; }
  .growth-label { font-size: 9.5px; color: #8b9aaa; width: 56px; flex-shrink: 0; }
  .growth-bar-track { flex: 1; height: 8px; background: #12161c; border-radius: 4px; overflow: hidden; }
  .growth-bar-fill { height: 100%; background: #ff9d4d; border-radius: 4px; }
  .growth-count { font-size: 10px; font-weight: 500; color: #e6edf3; width: 22px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<div class="tv" id="tv">
  <div class="topbar">
    <div>
      <div class="brand-name">Grupo Aspekto — Marketing</div>
      <div class="brand-sub" id="sub">Fluxo de produção de conteúdo</div>
    </div>
    <div class="live"><span class="dot"></span>Somente leitura · atualiza a cada 5 min</div>
  </div>
  <div class="warn-banner" id="warnBanner"></div>

  <section class="dashboard-section">
    <div class="section-header">
      <span class="section-accent" style="background:#b388ff;"></span>
      <span class="section-title">Fluxo de demanda</span>
    </div>
    <div class="grid" id="grid">
      <div class="loading-msg">Carregando demandas...</div>
    </div>
  </section>

  <section class="dashboard-section">
    <div class="section-header">
      <span class="section-accent" style="background:#4ade80;"></span>
      <span class="section-title">To do list</span>
    </div>
    <div class="by-user-board" id="byUserBoard"></div>
  </section>

  <section class="dashboard-section">
    <div class="section-header">
      <span class="section-accent" style="background:#ff9d4d;"></span>
      <span class="section-title">Detalhamento de demanda</span>
    </div>
    <div class="type-cards" id="typeCards"></div>
    <div class="section-subtitle">Entrega no prazo por responsável</div>
    <div class="ontime-row" id="ontimeRow"></div>
    <div class="section-subtitle">Volume mensal de demandas</div>
    <div class="growth-row" id="growthRow"></div>
  </section>
</div>

<script>
const DATA_URL = './data.json';
const REFRESH_MS = 2 * 60 * 1000;

const STATUS_ORDER = [
  { key: 'fila de demandas',              label: 'Fila de demandas',            accent: '#8b9aaa' },
  { key: 'criação de copy / roteiros',    label: 'Criação de copy / roteiros',  accent: '#4fc3f7' },
  { key: 'captação / gravação',           label: 'Captação / gravação',         accent: '#7c8cff' },
  { key: 'produção / edição',             label: 'Produção / edição',           accent: '#b388ff' },
  { key: 'aprovação 1',                   label: 'Aprovação 1',                 accent: '#f5c542' },
  { key: 'ajuste',                        label: 'Ajuste',                      accent: '#ff9d4d' },
  { key: 'aprovação 2',                   label: 'Aprovação 2',                 accent: '#f5c542' },
  { key: 'banco de publicações',          label: 'Banco de publicações',        accent: '#4ade80' },
  { key: 'concluído',                     label: 'Concluído',                   accent: '#26a37a' },
  { key: 'impedimento',                   label: 'Impedimento',                 accent: '#f56b6b', blinkHeader: true },
];
const STATUS_LABELS = Object.fromEntries(STATUS_ORDER.map(m => [m.key, m.label]));

function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase();
}

function fmtClock(iso) {
  return new Date(iso).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function fmtDuration(minutes) {
  if (!minutes || minutes <= 0) return '—';
  if (minutes < 60) return Math.round(minutes) + 'min';
  const hours = minutes / 60;
  if (hours < 24) return hours.toFixed(1) + 'h';
  return (hours / 24).toFixed(1) + 'd';
}

function dueBadge(dueDateMs) {
  if (!dueDateMs) return { cls: 'neutral', text: 'sem prazo' };
  const diffMs = dueDateMs - Date.now();
  const diffH = diffMs / 3600000;
  if (diffMs < 0) {
    const d = Math.abs(diffMs / 86400000);
    return { cls: 'danger', text: d >= 1 ? `atrasado ${Math.floor(d)}d` : 'atrasado' };
  }
  if (diffH <= 24) return { cls: 'warn', text: `vence em ${Math.max(1, Math.round(diffH))}h` };
  const d = diffH / 24;
  return { cls: 'ok', text: `vence em ${Math.ceil(d)}d` };
}

function sortByUrgency(tasks) {
  return tasks.slice().sort((a, b) => {
    const da = a.due_date ? Number(a.due_date) : Infinity;
    const db = b.due_date ? Number(b.due_date) : Infinity;
    return da - db;
  });
}

function cardHtml(task) {
  const due = dueBadge(task.due_date ? Number(task.due_date) : null);
  const cardClass = due.cls === 'danger' ? 'card-danger' : due.cls === 'warn' ? 'card-warn' : due.cls === 'ok' ? 'card-ok' : 'card-neutral';
  const assignee = task.assignee;
  return `
    <a class="client-card ${cardClass}" href="${task.url || '#'}" target="_blank" rel="noopener">
      <div class="c-nome" title="${(task.name || '').replace(/"/g, '&quot;')}">${task.name}</div>
      <div class="c-dono">
        <span class="c-avatar">${initials(assignee ? assignee.name : '')}</span>
        ${assignee ? assignee.name : 'Sem responsável'}
      </div>
      <div class="c-bottom">
        <span class="c-tempo c-${due.cls}">${due.text}</span>
        <span class="badge badge-${due.cls}">${due.cls === 'danger' ? 'Atrasado' : due.cls === 'warn' ? 'Atenção' : due.cls === 'ok' ? 'Ok' : 'Sem prazo'}</span>
      </div>
    </a>`;
}

function cardHtmlByUser(task) {
  const due = dueBadge(task.due_date ? Number(task.due_date) : null);
  const cardClass = due.cls === 'danger' ? 'card-danger' : due.cls === 'warn' ? 'card-warn' : due.cls === 'ok' ? 'card-ok' : 'card-neutral';
  return `
    <a class="client-card ${cardClass}" href="${task.url || '#'}" target="_blank" rel="noopener">
      <div class="c-nome" title="${(task.name || '').replace(/"/g, '&quot;')}">${task.name}</div>
      <div class="c-dono"><span class="stage-tag">${STATUS_LABELS[task.status] || task.status}</span></div>
      <div class="c-bottom">
        <span class="c-tempo c-${due.cls}">${due.text}</span>
        <span class="badge badge-${due.cls}">${due.cls === 'danger' ? 'Atrasado' : due.cls === 'warn' ? 'Atenção' : due.cls === 'ok' ? 'Ok' : 'Sem prazo'}</span>
      </div>
    </a>`;
}

function renderByUser(data) {
  const el = document.getElementById('byUserBoard');
  const members = data.members || [];
  const tasks = data.tasks || [];
  const userStatsById = Object.fromEntries((data.userStats || []).map(s => [s.id, s]));
  el.innerHTML = members.length ? members.map(m => {
    const mine = tasks.filter(t => t.assignee && t.assignee.id === m.id);
    const stat = userStatsById[m.id];
    const done = stat ? stat.done : mine.filter(t => t.status === 'concluído').length;
    const open = sortByUrgency(mine.filter(t => t.status !== 'concluído'));
    const cardsHtml = open.length ? open.map(cardHtmlByUser).join('') : '<div class="empty-col">— nada em aberto —</div>';
    return `
      <div class="user-col">
        <div class="user-col-header">
          <span class="uc-avatar">${initials(m.name)}</span>
          <div class="user-col-info">
            <span class="user-col-name">${m.name}</span>
            <span class="user-col-stats">${done} feitas · ${open.length} em aberto</span>
          </div>
        </div>
        <div class="cards">${cardsHtml}</div>
      </div>`;
  }).join('') : '<div class="empty-col">— sem membros —</div>';
}

function renderDetalhamento(data) {
  const tasksByType = data.tasksByType || {};
  const avgByType = data.avgCompletionTimeByType || {};
  const typeEl = document.getElementById('typeCards');
  const types = Object.keys(tasksByType).sort((a, b) => tasksByType[b] - tasksByType[a]);
  typeEl.innerHTML = types.length ? types.map(tipo => {
    const count = tasksByType[tipo];
    const avg = avgByType[tipo] ? fmtDuration(avgByType[tipo]) : '—';
    return `
      <div class="type-card">
        <div class="type-name">${tipo}</div>
        <div class="type-count">${count}<span>demanda(s)</span></div>
        <div class="type-time">méd. conclusão: ${avg}</div>
      </div>`;
  }).join('') : '<div class="empty-col">— sem dados —</div>';

  const ontime = data.onTimeRateByUser || [];
  const ontimeEl = document.getElementById('ontimeRow');
  ontimeEl.innerHTML = ontime.length ? ontime.map(u => {
    let cls = 'ot-neutral', text = '—';
    if (u.rate !== null && u.rate !== undefined) {
      text = u.rate + '%';
      cls = u.rate >= 90 ? 'ot-good' : u.rate >= 70 ? 'ot-warn' : 'ot-bad';
    }
    return `<div class="ontime-chip"><span class="ot-name">${u.name}</span><span class="ot-value ${cls}">${text}</span></div>`;
  }).join('') : '<div class="empty-col">— sem membros —</div>';

  const growth = data.monthlyVolume || [];
  const growthEl = document.getElementById('growthRow');
  const max = Math.max(1, ...growth.map(g => g.count));
  growthEl.innerHTML = growth.length ? growth.map(g => {
    const pct = Math.round((g.count / max) * 100);
    return `
      <div class="growth-item">
        <span class="growth-label">${g.month}</span>
        <div class="growth-bar-track"><div class="growth-bar-fill" style="width:${pct}%;"></div></div>
        <span class="growth-count">${g.count}</span>
      </div>`;
  }).join('') : '<div class="empty-col">— sem histórico ainda —</div>';
}

function render(data) {
  document.getElementById('sub').textContent = data.updatedAt
    ? `Fluxo de produção de conteúdo — atualizado em ${fmtClock(data.updatedAt)}`
    : 'Fluxo de produção de conteúdo';

  const tasks = data.tasks || [];
  const stageTimes = data.stageTimes || {};
  const grid = document.getElementById('grid');
  grid.innerHTML = STATUS_ORDER.map(meta => {
    const items = tasks.filter(t => (t.status || '').trim().toLowerCase() === meta.key);
    let shown = items;
    let moreNote = '';
    if (meta.key === 'concluído') {
      shown = items.slice().sort((a, b) => Number(b.date_closed || 0) - Number(a.date_closed || 0)).slice(0, 8);
      if (items.length > 8) moreNote = `<div class="empty-col">+${items.length - 8} mais concluídas</div>`;
    }
    const cardsHtml = shown.length ? shown.map(cardHtml).join('') : '<div class="empty-col">— vazio —</div>';
    const minutes = stageTimes[meta.key];
    const avgTime = minutes ? fmtDuration(minutes) : '—';
    return `
      <div class="col">
        <div class="col-header">
          <div class="accent-bar ${meta.blinkHeader && items.length ? 'blink' : ''}" style="background:${meta.accent};"></div>
          <div class="col-title">${meta.label}</div>
          <div class="col-time">méd. ${avgTime}</div>
          <div class="col-count">${items.length} <span>demanda(s)</span></div>
        </div>
        <div class="cards">${cardsHtml}${moreNote}</div>
      </div>`;
  }).join('');

  renderByUser(data);
  renderDetalhamento(data);
}

async function load() {
  const warnEl = document.getElementById('warnBanner');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    warnEl.style.display = 'none';
    render(data);
  } catch (e) {
    warnEl.textContent = `Falha ao carregar dados: ${e.message}`;
    warnEl.style.display = 'block';
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
